<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Pharma</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body class="bg-[#F5F5DC] text-black">

<div class="p-6 text-center">
    <h1 class="text-4xl font-bold mb-6">Future Pharma</h1>

    <!-- PRODUCTS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="products"></div>

    <!-- CART -->
    <div class="mt-10">
        <h2 class="text-2xl font-bold">Cart</h2>
        <div id="cart"></div>
        <p class="mt-4 font-bold">Total: <span id="total">$0.00</span></p>
    </div>

    <!-- CHECKOUT -->
    <div class="mt-10">
        <h2 class="text-2xl font-bold">Checkout</h2>
        <select id="crypto" class="border p-2 mt-2">
            <option value="">Select Crypto</option>
            <option value="btc">BTC</option>
            <option value="eth">ETH</option>
        </select>

        <div id="qr" class="mt-4 flex justify-center"></div>
        <input id="wallet" class="border p-2 w-full mt-2 text-center" readonly>
    </div>

    <!-- CONTACT -->
    <div id="contact" class="mt-16">
        <h2 class="text-2xl font-bold mb-4">Contact</h2>
        <form onsubmit="event.preventDefault(); sendContactEmail();" class="space-y-4 max-w-md mx-auto">
            <input type="text" placeholder="Name" class="border p-2 w-full">
            <input type="email" id="contact-email" placeholder="Email" class="border p-2 w-full">
            <textarea placeholder="Message" class="border p-2 w-full"></textarea>
            <button class="bg-black text-white px-4 py-2 w-full">Send</button>
        </form>
    </div>

    <!-- BESPOKE -->
    <div id="bespoke" class="mt-16">
        <h2 class="text-2xl font-bold mb-4">Bespoke Request</h2>
        <form onsubmit="event.preventDefault(); sendBespokeEmail();" class="space-y-4 max-w-md mx-auto">
            <input type="text" placeholder="Peptide Name" class="border p-2 w-full">
            <input type="number" placeholder="Quantity" class="border p-2 w-full">
            <input type="email" id="bespoke-email" placeholder="Your Email" class="border p-2 w-full">
            <button class="bg-black text-white px-4 py-2 w-full">Submit</button>
        </form>
    </div>

</div>

<script>
lucide.createIcons();

/* =========================
   EMAILJS INIT
========================= */
(function() {
    emailjs.init("HaAWzow0N9BMuVhJM");
})();

/* =========================
   DATA
========================= */
const products = [
    { id: 1, name: "GHK-CU", price: 49.99 },
    { id: 2, name: "CJC 1295", price: 149.99 },
    { id: 3, name: "IPAMORELIN", price: 149.99 }
];

const walletAddresses = {
    btc: 'bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh',
    eth: '0x71C7656EC7ab88b098defB751B7401B5f6d8976F'
};

let cart = [];

/* =========================
   PRODUCTS
========================= */
function renderProducts() {
    let html = '';
    products.forEach(p => {
        html += `
        <div class="border p-4">
            <h3 class="font-bold">${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick="addToCart(${p.id})" class="mt-2 bg-black text-white px-4 py-2">Add</button>
        </div>`;
    });
    document.getElementById('products').innerHTML = html;
}

/* =========================
   CART
========================= */
function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    updateCart();
}

function updateCart() {
    let html = '';
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;
        html += `
        <div class="flex justify-between">
            <span>${item.name}</span>
            <button onclick="removeFromCart(${index})">X</button>
        </div>`;
    });

    document.getElementById('cart').innerHTML = html;
    document.getElementById('total').innerText = `$${total.toFixed(2)}`;
}

/* =========================
   QR CODE
========================= */
function generateQR(address) {
    const qrContainer = document.getElementById('qr');
    qrContainer.innerHTML = '';

    new QRCode(qrContainer, {
        text: address,
        width: 128,
        height: 128
    });
}

document.getElementById('crypto').addEventListener('change', function() {
    const type = this.value;
    const address = walletAddresses[type];

    document.getElementById('wallet').value = address || '';

    if (address) generateQR(address);
});

/* =========================
   EMAIL FUNCTIONS
========================= */
function sendContactEmail() {
    const name = document.querySelector('#contact input[type="text"]').value;
    const email = document.getElementById('contact-email').value;
    const message = document.querySelector('#contact textarea').value;

    emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
        name: name,
        time: new Date().toLocaleString(),
        message: message,
        email: email
    })
    .then(() => {
        alert("Message sent successfully!");
    })
    .catch((err) => {
        console.error(err);
        alert("Failed to send message.");
    });
}

function sendBespokeEmail() {
    const inputs = document.querySelectorAll('#bespoke input');
    const peptide = inputs[0].value;
    const quantity = inputs[1].value;
    const email = document.getElementById('bespoke-email').value;

    emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
        name: "Bespoke Request",
        time: new Date().toLocaleString(),
        message: `Peptide: ${peptide}, Quantity: ${quantity}, Email: ${email}`
    })
    .then(() => {
        alert("Bespoke request sent!");
    })
    .catch((err) => {
        console.error(err);
        alert("Failed to send request.");
    });
}

/* =========================
   INIT
========================= */
renderProducts();

</script>

</body>
</html>
